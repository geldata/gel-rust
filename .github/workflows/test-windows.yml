on: [pull_request]

name: CI

jobs:
  build_and_test:
    name: Tests (Windows)
    runs-on: windows-2019
    strategy:
      matrix:
        rust_version: [default]
      fail-fast: false
    timeout-minutes: 30
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: checkout and env setup
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install WSL2
        uses: vedantmgoyal9/setup-wsl2@06c52482d0c544a04c68c7e74dcf5bc99b46c8f6
        with:
          distro: none

      - name: Install Gel CLI
        run: |
          bash <(curl --proto '=https' --tlsv1.2 -sSf https://sh.edgedb.com) --nightly -y
        shell: bash

      - name: Set PATH
        run: |
          Write-Host "Adding install path to PATH:"
          Write-Host "$env:USERPROFILE\AppData\Roaming\edgedb\bin"
          Add-Content $env:GITHUB_PATH "$env:USERPROFILE\AppData\Roaming\edgedb\bin"

      - name: Install Gel server
        run: |
          gel server install --nightly

      - name: Show binaries
        run: |
          ls -l ~/.local/bin
          edgedb-server --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version == 'default' && 'stable' || matrix.rust_version }}
          components: rustfmt, clippy

      - name: setup rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install just
        run: cargo install just

      - name: Test all features
        run: just test
