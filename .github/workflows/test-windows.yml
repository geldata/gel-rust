on: [pull_request]

name: CI

jobs:
  build_and_test:
    name: Tests (Windows)
    runs-on: windows-latest
    strategy:
      matrix:
        rust_version: [default]
      fail-fast: false
    timeout-minutes: 30
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: checkout and env setup
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install Gel CLI
        run: |
          bash <(curl --proto '=https' --tlsv1.2 -sSf https://sh.edgedb.com) --nightly -y
          set
          echo "PATH=$PATH;$HOME/bin" >> $GITHUB_ENV
        shell: bash

      - name: Install Gel server
        run: |
          gel server install --nightly

      - name: Show binaries
        run: |
          ls -l ~/.local/bin
          edgedb-server --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version == 'default' && 'stable' || matrix.rust_version }}
          components: rustfmt, clippy

      - name: setup rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install just
        run: cargo install just

      - name: Test all features
        run: just test
